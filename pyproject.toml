[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dqlens"
version = "0.1.0"
description = "Auto-generated data quality testing — find data problems automatically, no config, no test writing."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "DQLens Contributors" },
]
keywords = [
    "data-quality",
    "testing",
    "profiling",
    "database",
    "postgresql",
    "data-engineering",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "click>=8.0",
    "psycopg2-binary>=2.9",
    "pyyaml>=6.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
dqlens = "dqlens.cli:main"

[project.urls]
Homepage = "https://github.com/dqlens/dqlens"
Repository = "https://github.com/dqlens/dqlens"
Issues = "https://github.com/dqlens/dqlens/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
